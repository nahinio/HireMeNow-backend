<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset your password</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap");
      body {
        margin: 0;
        padding: 0;
        background: #f0edf7;
        font-family: "DM Sans", Arial, sans-serif;
      }
      .email-shell {
        padding: 2rem 1rem;
        display: flex;
        justify-content: center;
      }
      .email-card {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #e2d9f3;
      }
      .banner-wrap {
        background: #ebe9ff;
        height: 160px;
        overflow: hidden;
        border: 1px solid #e2d9f3;
        border-radius: 16px 16px 0 0;
      }
      .banner-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .email-body {
        padding: 32px 32px 12px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #f0edf7;
        color: #2b0480;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 100px;
        border: 1px solid #d6cff0;
        margin-bottom: 20px;
      }
      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #676dbb;
        display: inline-block;
      }
      .email-title {
        font-size: 22px;
        font-weight: 600;
        color: #0d0720;
        margin: 0 0 8px;
        line-height: 1.25;
      }
      .email-sub {
        font-size: 14px;
        color: #6b6b8a;
        font-weight: 400;
        margin: 0 0 28px;
        line-height: 1.6;
      }
      .cta-btn {
        display: block;
        width: 100%;
        background: #2b0480;
        color: #ffffff !important;
        text-decoration: none;
        text-align: center;
        padding: 14px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.02em;
        margin-bottom: 20px;
        box-sizing: border-box;
      }
      .expiry-note {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #faf9fe;
        border: 1px solid #e2d9f3;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 6px;
        text-align: center;
      }
      .expiry-text {
        font-size: 12px;
        color: #6b6b8a;
        line-height: 1.25;
        margin: 0;
      }
      .expiry-text strong {
        color: #2b0480;
        font-weight: 500;
      }
      .divider {
        height: 1px;
        background: #f0edf7;
        margin: 0 0 20px;
      }
      .ignore-note {
        font-size: 12px;
        color: #a0a0b8;
        line-height: 1.6;
        margin: 0;
      }
      .email-footer {
        border-top: 1px solid #f0edf7;
        padding: 10px 32px;
        text-align: center;
      }
      .footer-brand {
        font-size: 12px;
        color: #b0a8cc;
      }
      .footer-brand span {
        color: #2b0480;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="email-shell">
      <div class="email-card">
        <div class="banner-wrap">
          <img src="src\app\templates\HireMeNow.png" alt="HireMeNow banner" />
        </div>

        <div class="email-body">
          <div class="badge">
            Password Change request
          </div>
          <h1 class="email-title">Reset your password</h1>
          <p class="email-sub">
            We received a request to reset the password for your account. Click
            the button below to set a new one.
          </p>

          <a href="{{ reset_url }}" class="cta-btn">Set new password</a>

          <div class="expiry-note">
            <p class="expiry-text">
              If you didn't request a password reset, please ignore this email.
            </p>
          </div>
        </div>

        <div class="email-footer">
          <div class="footer-brand">Sent by <span>HireMeNow</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
