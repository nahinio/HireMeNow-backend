services:
  - type: web
    name: joinus-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: PYTHONPATH=src alembic upgrade head
    startCommand: PYTHONPATH=src uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: src
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: CORS_ORIGINS
        sync: false
