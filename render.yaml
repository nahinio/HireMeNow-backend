services:
  - type: web
    name: hiremenow-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: PYTHONPATH=src alembic upgrade head
    startCommand: PYTHONPATH=src uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: src
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: CORS_ORIGINS
        value: "http://hiremenow.nahinio.xyz,https://hiremenow.nahinio.xyz,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500"
      - key: PUBLIC_API_URL
        value: "https://hiremenow-backend-8la2.onrender.com"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_RESET_URL
        value: "http://hiremenow.nahinio.xyz/"
      - key: EMAIL_FROM
        value: "HireMeNow <noreply@hiremenow.nahinio.xyz>"
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
